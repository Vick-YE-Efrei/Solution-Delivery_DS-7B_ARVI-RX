name: CI
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
jobs:
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run smoke tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: python -m pytest -q

      - name: Check Python sources compile
        run: python -m compileall -q src api app eval finetuning tests

      - name: Run toy evaluation
        run: |
          python eval/run_evaluation.py --mode toy \
            --out-dir "${RUNNER_TEMP}/assistant-radio-eval" \
            --db-path "${RUNNER_TEMP}/assistant-radio-evidence.sqlite"